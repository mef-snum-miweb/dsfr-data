# =============================================================================
# Publish to separate repositories
# =============================================================================
#
# Publie les artefacts de build vers 3 repos de distribution :
#   - dsfr-data-grist   : plugins Grist (widget chart + datalist)
#   - dsfr-data-proxy   : proxy CORS nginx autonome
#   - dsfr-data-mcp     : serveur MCP pour connecteurs IA
#
# Declenchement : tag v* ou manuel.
#
# Prerequis : creer un secret PUBLISH_TOKEN contenant un PAT GitHub
# avec le scope "repo" (pour creer/pousser vers les repos cibles).
# =============================================================================

name: Publish to separate repos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Build commun (shared + lib + grist)
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Build library
        run: npm run build

      - name: Build grist-widgets
        run: npm run build --workspace=@dsfr-data/app-grist-widgets

      - name: Build MCP server
        run: cd mcp-server && npm ci && npm run build

      - name: Upload grist dist
        uses: actions/upload-artifact@v7
        with:
          name: grist-dist
          path: |
            apps/grist-widgets/dist/
            apps/grist-widgets/README.md

      - name: Upload proxy
        uses: actions/upload-artifact@v7
        with:
          name: proxy-dist
          path: |
            proxy/

      - name: Upload MCP server
        uses: actions/upload-artifact@v7
        with:
          name: mcp-dist
          path: |
            mcp-server/dist/
            mcp-server/package.json
            mcp-server/README.md

  # ---------------------------------------------------------------------------
  # Publish : dsfr-data-grist (plugins Grist)
  # ---------------------------------------------------------------------------
  publish-grist:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: grist-dist
          path: artifact

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare repo content
        run: |
          mkdir publish && cd publish
          cp -r ../artifact/dist/* .
          cp ../artifact/README.md . 2>/dev/null || true

      - name: Push to dsfr-data-grist repo
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create repo if it doesn't exist
          gh repo view "${{ github.repository_owner }}/dsfr-data-grist" >/dev/null 2>&1 || \
            gh repo create "${{ github.repository_owner }}/dsfr-data-grist" \
              --public \
              --description "Custom widgets DSFR pour Grist (graphiques, cartes, KPI, tableaux)"

          git add -A
          git commit -m "publish ${{ steps.version.outputs.tag }} from ${{ github.repository }}"
          git branch -M main
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/dsfr-data-grist.git"
          git push -f origin main

          if [[ "${{ steps.version.outputs.tag }}" != "latest" ]]; then
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}" --force
          fi

  # ---------------------------------------------------------------------------
  # Publish : dsfr-data-proxy (proxy CORS nginx)
  # ---------------------------------------------------------------------------
  publish-proxy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: proxy-dist
          path: artifact

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare repo content
        run: |
          mkdir publish && cd publish
          cp ../artifact/README.md .
          cp ../artifact/nginx/nginx.conf .
          cp ../artifact/nginx/docker-compose.yml .

      - name: Push to dsfr-data-proxy repo
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create repo if it doesn't exist
          gh repo view "${{ github.repository_owner }}/dsfr-data-proxy" >/dev/null 2>&1 || \
            gh repo create "${{ github.repository_owner }}/dsfr-data-proxy" \
              --public \
              --description "Proxy CORS nginx autonome pour dsfr-data"

          git add -A
          git commit -m "publish ${{ steps.version.outputs.tag }} from ${{ github.repository }}"
          git branch -M main
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/dsfr-data-proxy.git"
          git push -f origin main

          if [[ "${{ steps.version.outputs.tag }}" != "latest" ]]; then
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}" --force
          fi

  # ---------------------------------------------------------------------------
  # Publish : dsfr-data-mcp (serveur MCP)
  # ---------------------------------------------------------------------------
  publish-mcp:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcp-dist
          path: artifact

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare repo content
        run: |
          mkdir publish && cd publish
          cp -r ../artifact/dist .
          cp ../artifact/package.json .
          cp ../artifact/README.md . 2>/dev/null || true

      - name: Push to dsfr-data-mcp repo
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create repo if it doesn't exist
          gh repo view "${{ github.repository_owner }}/dsfr-data-mcp" >/dev/null 2>&1 || \
            gh repo create "${{ github.repository_owner }}/dsfr-data-mcp" \
              --public \
              --description "Serveur MCP pour generation de graphiques dsfr-data via IA"

          git add -A
          git commit -m "publish ${{ steps.version.outputs.tag }} from ${{ github.repository }}"
          git branch -M main
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/dsfr-data-mcp.git"
          git push -f origin main

          if [[ "${{ steps.version.outputs.tag }}" != "latest" ]]; then
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}" --force
          fi

  # ---------------------------------------------------------------------------
  # Publish : dsfr-data-docker (deploiement Docker autonome)
  # ---------------------------------------------------------------------------
  publish-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare repo content
        run: |
          mkdir publish
          cp docker/Dockerfile publish/
          cp docker/Dockerfile.db publish/
          cp docker/docker-compose.yml publish/
          cp docker/docker-compose.db.yml publish/
          cp docker/nginx.conf publish/
          cp docker/nginx-db.conf publish/
          cp docker/deploy.sh publish/
          cp docker/deploy-server.sh publish/
          cp .env.example publish/ 2>/dev/null || true
          chmod +x publish/deploy.sh publish/deploy-server.sh

      - name: Push to dsfr-data-docker repo
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          gh repo view "${{ github.repository_owner }}/dsfr-data-docker" >/dev/null 2>&1 || \
            gh repo create "${{ github.repository_owner }}/dsfr-data-docker" \
              --public \
              --description "Docker deployment for dsfr-data webapp (nginx + Express + MariaDB)"

          git add -A
          git commit -m "publish ${{ steps.version.outputs.tag }} from ${{ github.repository }}"
          git branch -M main
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/dsfr-data-docker.git"
          git push -f origin main

          if [[ "${{ steps.version.outputs.tag }}" != "latest" ]]; then
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}" --force
          fi
