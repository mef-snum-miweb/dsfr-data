name: Docker image scan

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'package-lock.json'
      - 'mcp-server/package-lock.json'
      - 'server/**'
      - 'packages/**'
      - 'apps/**'
      - 'scripts/build-app.js'
      - '.github/workflows/docker-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-scan.yml'
  schedule:
    # Scan hebdomadaire — les CVE OS arrivent après le build de l'image
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  scan:
    name: Trivy image (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: dsfr-data
            dockerfile: docker/Dockerfile
            tag: dsfr-data:scan
          - name: dsfr-data-db
            dockerfile: docker/Dockerfile.db
            tag: dsfr-data-db:scan

    steps:
      - uses: actions/checkout@v7

      - name: Build image
        # Valeur fictive pour VITE_PROXY_URL : l'image n'est jamais
        # deployee (juste scannee par Trivy) — le check fail-fast PR-3
        # de l'epic #168 a besoin d'une valeur non vide.
        run: |
          docker build \
            --build-arg VITE_PROXY_URL=https://example.test \
            -f ${{ matrix.image.dockerfile }} \
            -t ${{ matrix.image.tag }} \
            .

      - name: Trivy — scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image.tag }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: table
