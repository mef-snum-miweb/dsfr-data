name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/grist-widgets/**'
      - 'packages/core/src/**'
      - 'packages/shared/**'
      - 'specs/**'
      - 'guide/**'
      - 'scripts/transform-docs-for-pages.ts'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Build library (generate ESM + UMD)
        run: npm run build

      - name: Build grist-widgets
        run: npm run build --workspace=@dsfr-data/app-grist-widgets

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site

          # Grist widgets (chart/ and datalist/)
          cp -r apps/grist-widgets/dist/* _site/

          # Library bundles (needed by specs and guide pages)
          cp -r packages/core/dist/ _site/dist/

          # Specs pages
          cp -r specs/ _site/specs/

          # Guide pages
          cp -r guide/ _site/guide/

          # Root index.html (redirect to specs)
          cat > _site/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=specs/index.html">
            <title>dsfr-data</title>
          </head>
          <body>
            <p>Redirection vers <a href="specs/index.html">la documentation</a>...</p>
          </body>
          </html>
          HEREDOC

      - name: Replace app-header / app-footer with static blocks (Pages only)
        run: |
          # Les sources gardent <app-header>/<app-footer> pour la webapp
          # déployée où le header est partagé entre toutes les pages
          # (Builder, Dashboard, etc.). Sur GitHub Pages, seules specs/ et
          # guide/ sont publiées — le menu pointerait vers des routes 404.
          # On substitue donc en post-traitement, uniquement dans _site/.
          npx tsx scripts/transform-docs-for-pages.ts _site/specs
          npx tsx scripts/transform-docs-for-pages.ts _site/guide

      - name: Fix absolute paths for GitHub Pages
        run: |
          # Get the repository name for the base path
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          # Replace /dist/ absolute paths with GitHub Pages base path
          find _site/specs/ _site/guide/ -name '*.html' -exec \
            sed -i "s|src=\"/dist/|src=\"/${REPO_NAME}/dist/|g" {} +

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
