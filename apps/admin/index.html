<!DOCTYPE html>
<html lang="fr" data-fr-scheme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration - dsfr-data</title>
  <style>@view-transition{navigation:auto}app-header:not(:defined){display:block;min-height:56px}app-footer:not(:defined){display:block;min-height:48px}</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr.min.css" integrity="sha384-atVZ+aK6VI0nWyTEhKgze5InDJ+SWRRqa0BCZ2MTNyoOcBiHj1c3dGPdi6ML65B3" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/utility/utility.min.css" integrity="sha384-5P5DFFqorcEBpfnK9WHu/Ralfr7ZxyCZh0ryaJbgucSvc71+qRYdGvNEcyMqQwa/" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" integrity="sha384-6FSSi597BTd6QcnsBNoLclRKxTOyyYqkaucRjFgCNr8wHVCp0COLClSPY4Vy/bjh" crossorigin="anonymous">
  <script type="module" src="../../packages/core/dist/dsfr-data.esm.js"></script>
  <script type="module" src="../../packages/app-ui/dist/app-ui.esm.js"></script>
  <link rel="stylesheet" href="src/styles/admin.css">
</head>
<body>
  <app-header current-page="admin" base-path="../.."></app-header>

  <main class="fr-pb-8w" id="main-content">
    <div class="fr-container">
      <h1 class="fr-mt-4w">
        <i class="ri-admin-line"></i> Administration
      </h1>
      <p class="fr-text--lead" id="admin-subtitle">Gestion des utilisateurs et suivi des actions.</p>

      <div id="access-denied" class="fr-alert fr-alert--error fr-mb-2w" style="display:none">
        <p>Acces reserve aux administrateurs.</p>
      </div>

      <!-- Tabs (DSFR native pattern) -->
      <div id="admin-tabs" class="fr-tabs" style="display:none">
        <ul class="fr-tabs__list" role="tablist" aria-label="Onglets administration">
          <li role="presentation">
            <button type="button" id="tab-users" class="fr-tabs__tab" tabindex="0" role="tab" aria-selected="true" aria-controls="panel-users">Utilisateurs</button>
          </li>
          <li role="presentation">
            <button type="button" id="tab-audit" class="fr-tabs__tab" tabindex="-1" role="tab" aria-selected="false" aria-controls="panel-audit">Journal d'audit</button>
          </li>
          <li role="presentation">
            <button type="button" id="tab-stats" class="fr-tabs__tab" tabindex="-1" role="tab" aria-selected="false" aria-controls="panel-stats">Statistiques</button>
          </li>
        </ul>
        <div id="panel-users" class="fr-tabs__panel fr-tabs__panel--selected" role="tabpanel" aria-labelledby="tab-users" tabindex="0">
          <div id="users-list">
            <p class="admin-loading">Chargement...</p>
          </div>
          <div id="users-pagination" class="fr-mt-2w"></div>
        </div>
        <div id="panel-audit" class="fr-tabs__panel" role="tabpanel" aria-labelledby="tab-audit" tabindex="0">
          <div id="audit-list">
            <p class="admin-loading">Chargement...</p>
          </div>
          <div id="audit-pagination" class="fr-mt-2w"></div>
        </div>
        <div id="panel-stats" class="fr-tabs__panel" role="tabpanel" aria-labelledby="tab-stats" tabindex="0">
          <div id="stats-content">
            <p class="admin-loading">Chargement...</p>
          </div>
        </div>
      </div>

      <!-- User detail modal -->
      <dialog id="user-detail-modal" class="fr-modal" aria-labelledby="modal-title">
        <div class="fr-container fr-container--fluid fr-container-md">
          <div class="fr-grid-row fr-grid-row--center">
            <div class="fr-col-12 fr-col-md-8">
              <div class="fr-modal__body">
                <div class="fr-modal__header">
                  <button class="fr-btn--close fr-btn" title="Fermer" aria-controls="user-detail-modal" id="modal-close">Fermer</button>
                </div>
                <div class="fr-modal__content">
                  <h1 id="modal-title" class="fr-modal__title">Detail utilisateur</h1>
                  <div id="modal-body"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </dialog>
    </div>
  </main>

  <app-footer base-path="../.."></app-footer>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr.module.min.js" integrity="sha384-gPgRd2+olihO/srZe/Bqw6iVLiiaL7meuri1d5YVMejwPXg7VehLSBeORYq9yh2F" crossorigin="anonymous"></script>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
