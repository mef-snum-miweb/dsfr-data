<!DOCTYPE html>
<html lang="fr" data-fr-scheme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dsfr-data — Tableau DSFR (Grist)</title>

  <!-- DSFR -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr.min.css" integrity="sha384-atVZ+aK6VI0nWyTEhKgze5InDJ+SWRRqa0BCZ2MTNyoOcBiHj1c3dGPdi6ML65B3" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/utility/utility.min.css" integrity="sha384-5P5DFFqorcEBpfnK9WHu/Ralfr7ZxyCZh0ryaJbgucSvc71+qRYdGvNEcyMqQwa/" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" integrity="sha384-6FSSi597BTd6QcnsBNoLclRKxTOyyYqkaucRjFgCNr8wHVCp0COLClSPY4Vy/bjh" crossorigin="anonymous">

  <!-- dsfr-data (UMD : enregistre les custom elements + expose DsfrData global) -->
  <script src="../lib/dsfr-data.umd.js"></script>

  <!-- Grist Plugin API — URL versionless côté Grist, ajouter un SRI casserait
       le widget à chaque update upstream. Trust model : Grist self-hosted par
       les administrations qui déploient le widget (numérique.gouv.fr, docs.getgrist.com). -->
  <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- Widget entry point -->
  <script type="module" src="../src/datalist.ts"></script>
</head>
<body>
  <div class="grist-widget" id="widget-root">
    <div class="grist-empty" id="empty-state">
      <i class="ri-table-line"></i>
      <p>Les données de la table Grist seront affichees ici</p>
    </div>
    <div class="grist-toolbar" id="datalist-toolbar" style="display: none;">
      <button class="fr-btn fr-btn--sm fr-btn--tertiary-no-outline" id="btn-toggle-code" type="button">
        <span class="ri-code-s-slash-line" aria-hidden="true"></span>
        Voir le code
      </button>
    </div>
    <div class="grist-widget-content" id="datalist-container" style="display: none;">
      <dsfr-data-list
        source="grist"
        recherche
        pagination="20"
        export="csv">
      </dsfr-data-list>
    </div>
    <div class="grist-code-panel" id="code-panel" style="display: none;">
      <div class="grist-code-header">
        <div class="grist-code-tabs">
          <button class="grist-code-tab active" id="tab-fixed" type="button">Données fixes</button>
          <button class="grist-code-tab" id="tab-dynamic" type="button">Données dynamiques</button>
        </div>
        <button class="fr-btn fr-btn--sm fr-btn--tertiary-no-outline" id="btn-copy-code" type="button">
          <span class="ri-clipboard-line" aria-hidden="true"></span>
          Copier
        </button>
      </div>
      <pre class="grist-code-block"><code id="code-content"></code></pre>
    </div>
    <div class="grist-options-panel" id="options-panel"></div>
  </div>
</body>
</html>
