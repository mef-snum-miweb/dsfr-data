    }

    # Proxy CORS générique pour dsfr-data-source `use-proxy`.
    # Cible déterminée à la volée par le header X-Target-URL envoyé par le client.
    # DÉSACTIVABLE : commenter ce bloc si /cors-proxy est routé via un reverse
    # externe. Contrat : cf. docs/DEPLOYMENT.md
    # §"Configuration self-hosted" (#168 PR-5).
    location /cors-proxy {
        include /etc/nginx/conf.d/security-headers.conf;
        # Preflight CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Target-URL' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }

        # Resolver pour les noms de domaine dynamiques
        resolver 8.8.8.8 1.1.1.1 valid=30s;

        # Lire l'URL cible depuis le header X-Target-URL
        set $target_url $http_x_target_url;

        # Masquer les headers CORS upstream
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Target-URL' always;

        proxy_pass $target_url;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ne pas forwarder les headers internes
        proxy_set_header X-Target-URL "";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
    }

    # Beacon de tracking des widgets deployes
    # Enregistre le referer, le composant et le type de graphique
    location = /beacon {
        include /etc/nginx/conf.d/security-headers.conf;
        access_log /var/log/nginx/beacon.log beacon;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Cache-Control' 'no-store' always;
        empty_gif;
    }

    # Declenchement manuel du parsing des beacon logs
    # Ecrit un trigger que l'entrypoint detecte pour relancer le parsing
    location = /api/refresh-monitoring {
        include /etc/nginx/conf.d/security-headers.conf;
        access_log /tmp/beacon-refresh combined;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Cache-Control' 'no-store' always;
        return 204;
    }

    # MCP server (Model Context Protocol) pour les connecteurs IA
    location = /mcp {
        include /etc/nginx/conf.d/security-headers.conf;
        proxy_pass http://127.0.0.1:3001/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # Mock API pour les démos (données statiques)
    location /mock-api/ {
        include /etc/nginx/conf.d/security-headers.conf;
        alias /usr/share/nginx/html/public/mock-api/;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Apps - serve index.html for sub-routes
    location /apps/ {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Main location
    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ $uri.html $uri/index.html /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
