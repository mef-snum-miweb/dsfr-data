server {
    listen 8080;
    server_name localhost;
    server_tokens off;
    include /etc/nginx/conf.d/security-headers.conf;

    root /usr/share/nginx/html;
    index index.html;

    # Behind Traefik HTTPS proxy: use relative redirects so the browser
    # preserves the original scheme (HTTPS) instead of getting http:// 301s
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Cache policy (voir nginx-db.conf pour la justification)

    # /dist/ : lib dsfr-data non-hashée → revalidation systématique
    # (CORS conservé pour usage cross-origin depuis CodePen, sites tiers, etc.)
    location ^~ /dist/ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # HTML : revalidation systématique
    location ~* \.html$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Autres assets statiques : cache court
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Proxy CORS vers grist.numerique.gouv.fr (datasets Grist gouv).
    # DÉSACTIVABLE : commenter ce bloc si /grist-gouv-proxy/ est routé via un
    # reverse externe. Contrat (méthode, headers, cible) : cf.
    # docs/DEPLOYMENT.md §"Configuration self-hosted" (#168 PR-5).
    location /grist-gouv-proxy/ {
        include /etc/nginx/conf.d/security-headers.conf;
        # Répondre directement aux OPTIONS (Grist ne les supporte pas)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        # Masquer les headers CORS de l'upstream pour éviter les doublons
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # CORS headers pour les vraies requêtes
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        add_header 'Access-Control-Max-Age' 86400 always;

        proxy_pass https://grist.numerique.gouv.fr/;
        proxy_ssl_server_name on;
        proxy_set_header Host grist.numerique.gouv.fr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Supprimer origin/referer pour éviter le rejet CORS de l'upstream
        proxy_set_header Origin '';
        proxy_set_header Referer '';

        # Cache GET 60s, bypass POST
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 60s;
        proxy_cache_bypass $request_method;
    }

    # Proxy CORS vers docs.getgrist.com (datasets Grist SaaS).
    # DÉSACTIVABLE : commenter ce bloc si /grist-proxy/ est routé via un
    # reverse externe. Contrat : cf. docs/DEPLOYMENT.md
    # §"Configuration self-hosted" (#168 PR-5).
    location /grist-proxy/ {
        include /etc/nginx/conf.d/security-headers.conf;
        # Répondre directement aux OPTIONS (Grist ne les supporte pas)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        # Masquer les headers CORS de l'upstream pour éviter les doublons
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # CORS headers pour permettre l'accès depuis n'importe quel domaine
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        add_header 'Access-Control-Max-Age' 86400 always;

        proxy_pass https://docs.getgrist.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host docs.getgrist.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Supprimer origin/referer pour éviter le rejet CORS de l'upstream
        proxy_set_header Origin '';
        proxy_set_header Referer '';

        # Cache GET 60s, bypass POST
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 60s;
        proxy_cache_bypass $request_method;
    }

    # Proxy CORS vers albert.api.etalab.gouv.fr (Albert IA, token client).
