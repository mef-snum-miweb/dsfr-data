    }

    # Proxy CORS vers tabular-api.data.gouv.fr (Tabular API data.gouv.fr).
    # DÉSACTIVABLE : commenter ce bloc si /tabular-proxy/ est routé via un
    # reverse externe. Contrat : cf. docs/DEPLOYMENT.md
