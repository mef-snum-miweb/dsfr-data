services:
  chartsbuilder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Propagation des variables build-time consommées par Vite.
        # Valeurs lues depuis le `.env` du repo (`--env-file .env` côté
        # deploy.sh / deploy-server.sh). Si absentes, le build retombe
        # sur le fallback historique de packages/shared/src/api/proxy-config.ts.
        # Cf. issue #168 (PR-1).
        VITE_PROXY_URL: ${VITE_PROXY_URL:-}
        VITE_LIB_URL: ${VITE_LIB_URL:-}
    container_name: chartsbuilder
    restart: unless-stopped

    # Variables d'environnement pour le proxy IA par defaut
    environment:
      - IA_DEFAULT_TOKEN=${IA_DEFAULT_TOKEN:-}
      - IA_DEFAULT_API_URL=${IA_DEFAULT_API_URL:-https://albert.api.etalab.gouv.fr/v1/chat/completions}
      - IA_DEFAULT_MODEL=${IA_DEFAULT_MODEL:-albert-large}

    # Persister les beacon logs pour le monitoring (survit aux redémarrages)
    volumes:
      - beacon-logs:/var/log/nginx

    # Réseau Traefik (même réseau que ecosystem)
    networks:
      - ecosystem-network

    # Labels Traefik
    labels:
      - "traefik.enable=true"

      # Router HTTP (redirige vers HTTPS)
      - "traefik.http.routers.chartsbuilder-http.rule=Host(`${APP_DOMAIN:-chartsbuilder.matge.com}`)"
      - "traefik.http.routers.chartsbuilder-http.entrypoints=web"
      - "traefik.http.routers.chartsbuilder-http.middlewares=redirect-to-https"

      # Router HTTPS
      - "traefik.http.routers.chartsbuilder-https.rule=Host(`${APP_DOMAIN:-chartsbuilder.matge.com}`)"
      - "traefik.http.routers.chartsbuilder-https.middlewares=chartsbuilder-headers@file"
      - "traefik.http.routers.chartsbuilder-https.entrypoints=websecure"
      - "traefik.http.routers.chartsbuilder-https.tls=true"
      - "traefik.http.routers.chartsbuilder-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chartsbuilder-https.tls.options=anssi-strict@file"
      # Pas de Basic Auth - les clés API sont stockées en localStorage (privées par utilisateur)

      # Service — nginx non-root écoute 8080 (cf. #66 / docker/Dockerfile)
      - "traefik.http.services.chartsbuilder.loadbalancer.server.port=8080"

      # Middleware de redirection HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

# Réseau externe Traefik (même que le projet ecosystem)
volumes:
  beacon-logs:

networks:
  ecosystem-network:
    external: true
