# Docker Compose override for "database" mode.
# Usage: cd docker && docker compose -f docker-compose.yml -f docker-compose.db.yml up -d --build
#
# Adds a backend Express + MariaDB server with auth, RBAC, and data persistence.
# Requires a .env file with JWT_SECRET, DB_PASSWORD, DB_ROOT_PASSWORD, ENCRYPTION_KEY.

services:
  mariadb:
    image: mariadb:11
    container_name: dsfr-data-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-dsfr_data}
      MYSQL_USER: ${DB_USER:-dsfr_data}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  chartsbuilder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.db
      args:
        # Propagation des variables build-time consommées par Vite.
        # Valeurs lues depuis le `.env` du repo (`--env-file .env` côté
        # deploy-server.sh). Si absentes, le build retombe sur le fallback
        # historique de packages/shared/src/api/proxy-config.ts.
        # Cf. issue #168 (PR-1).
        VITE_PROXY_URL: ${VITE_PROXY_URL:-}
        # Séparation app runtime / code embed / beacon télémétrie. Fallback en
        # cascade dans packages/shared/src/api/proxy-config.ts. Cf. issue #180.
        VITE_PROXY_URL_EMBED: ${VITE_PROXY_URL_EMBED:-}
        VITE_BEACON_URL: ${VITE_BEACON_URL:-}
        VITE_LIB_URL: ${VITE_LIB_URL:-}
        # Hash court du commit affiché dans le footer (calculé par
        # deploy-server.sh, .git absent du contexte Docker).
        DSFR_DATA_COMMIT: ${DSFR_DATA_COMMIT:-}
        # Proxy HTTP sortant pour `npm ci` + `apk add` au build derrière
        # un proxy d'entreprise. Build-time uniquement (pas runtime).
        # Cf. issue #168 (PR-2). PR-4 traitera le runtime côté Node.
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - beacon-logs:/var/log/nginx
    environment:
      - GOUV_WIDGETS_MODE=database
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-dsfr_data}
      - DB_USER=${DB_USER:-dsfr_data}
      - DB_PASSWORD=${DB_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST:-mailserver}
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_FROM=${SMTP_FROM:-noreply@ecosysteme.matge.com}
      - APP_URL=${APP_URL:-https://chartsbuilder.matge.com}
      # Déploiement derrière un reverse proxy externe. Vides par défaut →
      # comportement inchangé (trust proxy 'loopback', vérification email ON).
      - TRUST_PROXY=${TRUST_PROXY:-}
      - REQUIRE_EMAIL_VERIFICATION=${REQUIRE_EMAIL_VERIFICATION:-}
      # Bootstrap admin TEMPORAIRE (à retirer après usage). Vides → inactif.
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
      - IA_DEFAULT_TOKEN=${IA_DEFAULT_TOKEN:-}
      - IA_DEFAULT_API_URL=${IA_DEFAULT_API_URL:-https://albert.api.etalab.gouv.fr/v1/chat/completions}
      - IA_DEFAULT_MODEL=${IA_DEFAULT_MODEL:-albert-large}
      # Proxy HTTP sortant au runtime (ia-default-server + mcp-server).
      # Honoré via undici.EnvHttpProxyAgent : HTTP_PROXY/HTTPS_PROXY/NO_PROXY
      # (et variantes minuscules) sont lues au démarrage. Sans variable,
      # aucun proxy n'est installé. Cf. issue #168 PR-4.
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    networks:
      - internal
      - ecosystem-network

volumes:
  beacon-logs:
  mariadb-data:

networks:
  internal:
